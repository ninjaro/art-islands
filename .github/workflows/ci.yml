name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        run: |
          python -m pip install --quiet -e . pytest
          npm ci

      - name: Python tests (model, CLI, evolution, batch parser)
        run: python -m pytest tests -q

      - name: TypeScript checks
        run: npx tsc --noEmit

      - name: JavaScript unit and graph algorithm tests
        run: npx vitest run

      - name: Rebuild static exports
        run: python -m art_islands export

      - name: SQLite foreign-key check
        run: |
          python - <<'PY'
          import sqlite3
          db = sqlite3.connect("data/art-islands.sqlite")
          rows = db.execute("pragma foreign_key_check").fetchall()
          assert not rows, f"foreign key violations: {rows}"
          print("foreign keys ok")
          PY

      - name: Validate generated JSON
        run: |
          python - <<'PY'
          import json, pathlib
          for path in sorted(pathlib.Path("public/data").glob("*.json")):
              json.loads(path.read_text(encoding="utf-8"))
              print(f"ok {path}")
          PY

      - name: React production build
        run: npm run build

      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium

      - name: Playwright browser tests
        run: npx playwright test

      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report
          retention-days: 7
